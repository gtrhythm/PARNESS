abstract_seed: |
  Recent autonomous research systems demonstrate that LLM agents can ideate,
  run experiments, and write papers, but each fixes a particular control-flow
  shape. parness decomposes the entire research life-cycle into a declarative
  DAG over 116 registered modules and 20 YAML pipelines, delegating all domain
  semantics to ordinary modules through a four-field agent contract.
