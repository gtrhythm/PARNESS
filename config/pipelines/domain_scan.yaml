name: domain_scan
config:
  domain: "neuroscience"
  max_keywords: 20
  max_papers: 200
  year_from: 2024
  year_to: 2026
  download_pdf: true
  output_dir: "downloaded_papers/domain_scan"
  db_path: "output/papers.db"

nodes:
  - id: expand_keywords
    module: taxonomy_expander
    params:
      max_keywords: 20
    input_mapping:
      domain: config.domain
    output_mapping:
      keywords: candidate_keywords

  - id: pick_keyword
    module: keyword_selector
    depends_on: [expand_keywords]
    params:
      strategy: random
    input_mapping:
      keywords: output.expand_keywords.candidate_keywords
    output_mapping:
      keyword: current_keyword

  - id: crawl
    module: crawl_orchestrator
    depends_on: [pick_keyword]
    input_mapping:
      keyword: output.pick_keyword.keyword
      domain: config.domain
      year_from: config.year_from
      year_to: config.year_to
      max_papers: config.max_papers
      download_pdf: config.download_pdf
      output_dir: config.output_dir
    output_mapping:
      papers: crawled_papers
      pdf_results: crawled_pdf_results

  - id: persist_results
    module: summary_persist
    depends_on: [crawl]
    params:
      db_path: config.db_path
    input_mapping:
      metadata: output.crawl.crawled_papers
      source: output.crawl.domain
      domain: config.domain

  - id: persist_downloads
    module: pdf_download_persist
    depends_on: [crawl]
    params:
      db_path: config.db_path
    input_mapping:
      results: output.crawl.crawled_pdf_results
      metadata: output.crawl.crawled_papers
      source: output.crawl.domain
