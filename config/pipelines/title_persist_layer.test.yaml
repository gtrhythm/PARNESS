name: title_persist_layer_test
description: "Smoke-test variant: short freshness window, scans pdf_kit_parsed_test."

config:
  max_rounds: 200
  parsed_root: "output/pdf_kit_parsed_test"

nodes:
  - id: feeder
    module: parsed_folder_freshness_feeder
    params:
      parsed_root: "output/pdf_kit_parsed_test"
      min_quiet_seconds: 30
      require_files: ["paper_id.txt"]
      forbid_files: ["title.md"]
      wait_seconds: 15
      max_wait_total_seconds: 2400
    routes:
      has_next: load_parsed
      exhausted: done

  - id: load_parsed
    module: parsed_folder_loader
    depends_on: [feeder]
    input_mapping:
      folder_path: output.feeder.folder_path
      paper_id: output.feeder.paper_id
    routes:
      default: parse_gate

  - id: parse_gate
    module: parse_result_gate
    depends_on: [load_parsed]
    input_mapping:
      parsed_papers: output.load_parsed.parsed_papers
      parse_errors: output.load_parsed.parse_errors
    routes:
      success: extract_title
      fail: feeder

  - id: extract_title
    module: title_extractor
    depends_on: [parse_gate]
    input_mapping:
      papers: output.load_parsed.parsed_papers
    params:
      headings_only: true
      consensus_n: 3
      max_retries: 6
      max_concurrent: 1
    routes:
      default: title_gate

  - id: title_gate
    module: title_result_gate
    depends_on: [extract_title]
    input_mapping:
      titles: output.extract_title.titles
      paper_id: output.parse_gate.paper_id
    routes:
      success: persist_title
      fail: feeder

  - id: persist_title
    module: title_persist
    depends_on: [title_gate]
    input_mapping:
      folder_path: output.feeder.folder_path
      title: output.title_gate.validated_title
      paper_id: output.parse_gate.paper_id
    routes:
      default: feeder

  - id: done
    depends_on: [feeder]
